services:
  - type: web
    name: codejudge-api
    runtime: docker
    plan: free
    rootDir: backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: codejudge-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: LLM_PROVIDER
        value: mock

databases:
  - name: codejudge-db
    databaseName: codejudge
    user: codejudge
    plan: free

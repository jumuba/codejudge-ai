services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-codejudge}
      POSTGRES_USER: ${POSTGRES_USER:-codejudge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codejudge-local}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codejudge}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-codejudge}:${POSTGRES_PASSWORD:-codejudge-local}@db:5432/${POSTGRES_DB:-codejudge}
      JWT_SECRET: ${JWT_SECRET:-local-development-secret-change-me}
      FRONTEND_URL: http://localhost:3000
    ports: ["8000:8000"]
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports: ["3000:3000"]
    depends_on: [api]

volumes:
  postgres_data:
